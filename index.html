            } else {

            document.getElementById('section-title').innerText = titles[c];

            renderUI();

| curCat === 'mind') chartsToShow = ['sleep', 'screen'];

                    const canvasId = `canvas-${c.id}`;
                    
                    chartContainer.innerHTML += `
                        <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-lg font-display font-bold text-slate-800">${c.title}</h3>
                                <span class="px-3 py-1 text-[9px] font-black uppercase tracking-widest rounded-full ${c.tagColor}">${c.tag}</span>
                            </div>
                            <div class="relative w-full h-[200px]">
                                <canvas id="${canvasId}"></canvas>
                            </div>
                            <p class="text-[11px] text-slate-400 mt-4 leading-relaxed font-medium">${c.subtitle}</p>
                        </div>
                    `;
                });

                // Initialize charts after injecting HTML
                setTimeout(() => {
                    chartsToShow.forEach(chartKey => {
                        const c = chartConfigs[chartKey];
                        const ctx = document.getElementById(`canvas-${c.id}`);
                        const baseOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } };
                        chartInstances[chartKey] = new Chart(ctx, {
                            type: c.type,
                            data: c.data,
                            options: {...baseOptions,...c.options }
                        });
                    });
                }, 50);
            } else {
                chartContainer.classList.add('hidden');
            }
        }

        function renderUI() {
            // 1. Render Age Nav
            const nav = document.getElementById('age-nav');
            nav.innerHTML = '';
            const ages = ["11", "12", "13", "14", "15", "16", "17", "18", "19-25"];
            
            ages.forEach(i => {
                const b = document.createElement('button');
                b.innerText = i === "19-25"? "19-25 (Emerging)" : `Age ${i}`; 
                b.onclick = () => setAge(i);
                b.className = `age-btn flex-shrink-0 px-5 h-10 rounded-lg font-bold text-sm transition-all whitespace-nowrap ${curAge === i? 'active' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}`;
                nav.appendChild(b);
            });

            // 2. Render Cards
            const grid = document.getElementById('milestone-grid');
            const d = waveData[curGen][curAge];
            
            const allPanels = [
                { id: 'phys', title: 'Physical', data: d.phys ||, icon: '🏄', color: 'border-coastal-teal text-coastal-teal' },
                { id: 'mind', title: 'Cognitive', data: d.mind ||, icon: '🧠', color: 'border-coastal-dark text-coastal-dark' },
                { id: 'friend', title: 'Friends', data: d.friend ||, icon: '🤙', color: 'border-sky-500 text-sky-600' },
                { id: 'parent', title: 'Parents', data: d.parent ||, icon: '🏠', color: 'border-indigo-400 text-indigo-600' },
                { id: 'romance', title: 'Romance', data: d.romance ||, icon: '❤️', color: 'border-rose-400 text-rose-600' },
                { id: 'emotion', title: 'Emotions', data: d.emotion ||, icon: '🌊', color: 'border-cyan-400 text-cyan-600' },
                { id: 'exp', title: 'Boundaries', data: d.exp ||, icon: '🛹', color: 'border-orange-400 text-orange-600' },
                { id: 'chores', title: 'Chores', data: d.chores ||, icon: '🧹', color: 'border-emerald-400 text-emerald-600' },
                { id: 'red', title: 'Red Flags', data: d.red ||, icon: '🚩', color: 'bg-rose-50 border-rose-500 text-rose-600' }
            ];

            const filtered = curCat === 'all'? allPanels : allPanels.filter(x => x.id === curCat |

| (curCat!== 'red' && x.id === 'red'));
            const finalPanels = filtered.filter(p => p.data && p.data.length > 0);
            
            grid.innerHTML = finalPanels.map(x => `
                <div class="p-6 md:p-8 rounded-3xl border-t-[6px] shadow-sm hover:shadow-md transition-all ${x.id === 'red'? 'bg-rose-50 border-rose-500' : 'bg-white ' + x.color}">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="text-3xl">${x.icon}</span>
                        <h4 class="font-black text-slate-900 uppercase text-xs tracking-widest">${x.title}</h4>
                    </div>
                    <ul class="space-y-4">
                        ${x.data.map(item => `<li class="flex items-start gap-3 text-sm text-slate-600 font-medium leading-relaxed"><span class="${x.id === 'red'? 'text-rose-500' : 'text-coastal-teal'} mt-0.5 text-lg leading-none">•</span><span>${item}</span></li>`).join('')}
                    </ul>
                </div>`).join('');

            // 3. Render Charts
            renderCharts();
        }

        window.onload = () => { renderUI(); };
    </script>
</body>
</html>
